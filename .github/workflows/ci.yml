name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Tests
        run: pip install flask
        run: python -m unittest -v tests/appTest.py