name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
          
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Executar Build
        run: echo "Olá, ${{ github.actor }}!"

  test:
    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependências
        run: | 
          pip install flask
          pip install coverage
          pip install semgrep

      - name: Rodar testes
        run: | 
          python -m coverage run -m unittest -v tests/appTest.py
          python -m coverage report

      - name: Rodar Semgrep (SAST)
        run: |
          semgrep --config=auto --json --output=semgrep-report.json || true

      - name: Upload relatório SAST
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: semgrep-report.json

      - name: Validar relatório SAST
        run: |
          python <<EOF
          import json

          with open('semgrep-report.json') as f:
              report = json.load(f)

          vulnerabilities = report.get('results', [])

          if vulnerabilities:
              print(f"\n== Relatório de Vulnerabilidades ({len(vulnerabilities)} encontradas) ==")

              for vuln in vulnerabilities:
                  name = vuln.get('check_id', 'Sem nome')
                  path = vuln.get('path', 'Arquivo não especificado')
                  start_line = vuln.get('start', {}).get('line', '?')
                  end_line = vuln.get('end', {}).get('line', '?')
                  extra = vuln.get('extra', {})
                  message = extra.get('message', 'Sem descrição')
                  severity = extra.get('severity', 'N/A')

                  print(f"\n- Nome: {name}")
                  print(f"  Severidade: {severity}")
                  print(f"  Descrição: {message}")
                  print(f"  Arquivo: {path}")
                  print(f"  Linhas: {start_line}-{end_line}")

              exit(1)
          else:
              print("Nenhuma vulnerabilidade encontrada.")
          EOF

  deploy:
    runs-on: ubuntu-latest

    needs: [build, test]

    environment:
      name: production

    steps:
      - name: Simular deploy
        run: |

          echo "Implantando a branch ${{ github.ref_name }} em produção..."
          sleep 20
          echo "Implantação concluída com sucesso!"
